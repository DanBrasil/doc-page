<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Documentos Legais — MYBE / BRM1</title>
    <meta
      name="description"
      content="Central de documentos legais da plataforma MYBE e BRM1."
    />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="style.css" />
    <style>
      /* ── Shell styles — inlined so the page is always styled ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; font-size: 16px; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        font-size: 1rem; line-height: 1.75;
        color: #2c2c2c; background-color: #f7f7f7;
      }
      .page-wrapper { max-width: 780px; margin: 0 auto; padding: 0 1.25rem; }

      /* Header */
      .site-header {
        background-color: #1a1a2e; color: #fff;
        padding: 2rem 0; border-bottom: 3px solid #e8e8e8;
      }
      .site-header .page-wrapper { display: flex; flex-direction: column; gap: .25rem; }
      .site-header__brand {
        font-size: .75rem; font-weight: 600; letter-spacing: .12em;
        text-transform: uppercase; color: #a0aec0;
      }
      .site-header__title { font-size: 1.5rem; font-weight: 700; color: #fff; line-height: 1.3; }

      /* Nav bar */
      .doc-nav { background-color: #252545; border-bottom: 1px solid #3a3a5c; }
      .doc-nav .page-wrapper { padding-top: 0; padding-bottom: 0; max-width: 820px; }
      .doc-nav__list { display: flex; flex-wrap: wrap; list-style: none; padding: 0; margin: 0; }
      .doc-nav__link {
        display: block; padding: .8rem 1rem; color: #a0aec0;
        text-decoration: none; font-size: .82rem; font-weight: 500;
        letter-spacing: .02em; white-space: nowrap;
        transition: color .15s ease, background-color .15s ease;
      }
      .doc-nav__link:hover { color: #fff; background-color: rgba(255,255,255,.07); }
      .doc-nav__link--active { color: #fff; box-shadow: inset 0 -2px 0 #4a6fa5; }

      /* Content area */
      .site-main {
        background-color: #fff;
        border-left: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0;
        min-height: 60vh;
      }
      .content-body { padding: 2rem 0; }
      .intro-section__heading {
        font-size: 1.75rem; font-weight: 700; color: #1a1a2e; line-height: 1.3;
      }

      /* Home list */
      .doc-home__list { list-style: none; padding: 0; margin: 0; }
      .doc-home__list li { border-bottom: 1px solid #edf2f7; }
      .doc-home__list li:first-child { border-top: 1px solid #edf2f7; }
      .doc-home__list a {
        display: flex; align-items: center; justify-content: space-between;
        padding: 1.1rem .75rem 1.1rem 1rem;
        color: #1a1a2e; text-decoration: none;
        font-size: 1rem; font-weight: 500;
        background-color: #fff;
        transition: background-color .15s ease, padding-left .15s ease;
      }
      .doc-home__list a::after {
        content: "→"; color: #4a6fa5; font-size: 1rem;
        flex-shrink: 0; margin-left: 1rem;
        transition: transform .15s ease;
      }
      .doc-home__list a:hover {
        background-color: #f0f4ff; padding-left: 1.25rem;
      }
      .doc-home__list a:hover::after { transform: translateX(3px); }

      /* Footer */
      .site-footer {
        background-color: #1a1a2e; color: #a0aec0;
        padding: 2rem 0; margin-top: 2rem; font-size: .85rem;
      }
      .site-footer .page-wrapper { display: flex; flex-direction: column; gap: .4rem; }
      .site-footer__brand { font-weight: 700; color: #e2e8f0; font-size: .9rem; }
      .site-footer p { color: #718096; }

      @media (min-width: 900px) {
        .site-main {
          border-radius: 4px; border: 1px solid #e2e8f0;
          margin: 1.5rem auto; max-width: 820px;
        }
        body { padding-bottom: 2rem; }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="page-wrapper">
        <span class="site-header__brand">MYBE / BRM1 — Documentos Legais</span>
        <h1 class="site-header__title" id="page-title">Documentos Legais</h1>
      </div>
    </header>

    <nav class="doc-nav" aria-label="Navegação de documentos">
      <div class="page-wrapper">
        <ul class="doc-nav__list">
          <li>
            <a class="doc-nav__link" href="#termos-de-uso">Termos de Uso</a>
          </li>
          <li>
            <a class="doc-nav__link" href="#politica-de-privacidade"
              >Política de Privacidade</a
            >
          </li>
          <li>
            <a class="doc-nav__link" href="#politica-de-cookies"
              >Política de Cookies</a
            >
          </li>
          <li>
            <a class="doc-nav__link" href="#aviso-programa-de-privacidade"
              >Aviso de Privacidade</a
            >
          </li>
        </ul>
      </div>
    </nav>

    <div id="app"></div>

    <footer class="site-footer" id="site-footer" hidden>
      <div class="page-wrapper">
        <span class="site-footer__brand">MYBE / BRM1</span>
        <p>Documento válido a partir de sua publicação.</p>
      </div>
    </footer>

    <script>
      var routes = {
        "termos-de-uso": {
          file: "termos-de-uso.html",
          title: "Termos e Condições de Uso",
        },
        "politica-de-privacidade": {
          file: "politica-de-privacidade.html",
          title: "Política de Privacidade",
        },
        "politica-de-cookies": {
          file: "politica-de-cookies.html",
          title: "Política de Cookies",
        },
        "aviso-programa-de-privacidade": {
          file: "aviso-programa-de-privacidade.html",
          title: "Aviso do Programa de Privacidade",
        },
      };

      var app = document.getElementById("app");
      var pageTitle = document.getElementById("page-title");
      var siteFtr = document.getElementById("site-footer");

      function setActiveNav(hash) {
        document.querySelectorAll(".doc-nav__link").forEach(function (a) {
          a.classList.toggle(
            "doc-nav__link--active",
            a.getAttribute("href") === "#" + hash,
          );
        });
      }

      function showHome() {
        document.title = "Documentos Legais — MYBE / BRM1";
        pageTitle.textContent = "Documentos Legais";
        app.innerHTML =
          '<div class="site-main">' +
          '<div class="page-wrapper content-body">' +
          '<h2 class="intro-section__heading" style="margin-bottom:1.5rem">Selecione um documento</h2>' +
          '<ul class="doc-home__list">' +
          '<li><a href="#termos-de-uso">Termos e Condições de Uso</a></li>' +
          '<li><a href="#politica-de-privacidade">Política de Privacidade</a></li>' +
          '<li><a href="#politica-de-cookies">Política de Cookies</a></li>' +
          '<li><a href="#aviso-programa-de-privacidade">Aviso do Programa de Privacidade</a></li>' +
          "</ul>" +
          "</div>" +
          "</div>";
        siteFtr.hidden = true;
        setActiveNav("");
      }

      async function loadRoute(hash) {
        var route = routes[hash];
        if (!route) {
          showHome();
          return;
        }

        app.innerHTML =
          '<div class="site-main" style="padding:3rem 0;text-align:center;color:#718096">Carregando…</div>';

        try {
          var res = await fetch(route.file);
          var text = await res.text();
          var doc = new DOMParser().parseFromString(text, "text/html");
          var main = doc.querySelector("main");
          if (!main) throw new Error("no main");

          var titleEl = doc.querySelector("title");
          document.title = titleEl ? titleEl.textContent : route.title;
          pageTitle.textContent = route.title;

          app.innerHTML = "";
          app.appendChild(document.importNode(main, true));

          var fetchedFtr = doc.querySelector(".site-footer");
          if (fetchedFtr) siteFtr.innerHTML = fetchedFtr.innerHTML;
          siteFtr.hidden = false;
        } catch (e) {
          app.innerHTML =
            '<div class="site-main"><div class="page-wrapper content-body">' +
            '<p style="color:#c53030">Erro ao carregar o documento.</p>' +
            "</div></div>";
          siteFtr.hidden = true;
        }

        setActiveNav(hash);
        window.scrollTo(0, 0);
      }

      function route() {
        var hash = location.hash.replace("#", "");
        if (!hash) showHome();
        else loadRoute(hash);
      }

      window.addEventListener("hashchange", route);
      route();
    </script>
  </body>
</html>
