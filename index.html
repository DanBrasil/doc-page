<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Documentos Legais — MYBE / BRM1</title>
    <meta
      name="description"
      content="Central de documentos legais da plataforma MYBE e BRM1."
    />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="page-wrapper">
        <span class="site-header__brand">MYBE / BRM1 — Documentos Legais</span>
        <h1 class="site-header__title" id="page-title">Documentos Legais</h1>
      </div>
    </header>

    <nav class="doc-nav" aria-label="Navegação de documentos">
      <div class="page-wrapper">
        <ul class="doc-nav__list">
          <li>
            <a class="doc-nav__link" href="#termos-de-uso">Termos de Uso</a>
          </li>
          <li>
            <a class="doc-nav__link" href="#politica-de-privacidade"
              >Política de Privacidade</a
            >
          </li>
          <li>
            <a class="doc-nav__link" href="#politica-de-cookies"
              >Política de Cookies</a
            >
          </li>
          <li>
            <a class="doc-nav__link" href="#aviso-programa-de-privacidade"
              >Aviso de Privacidade</a
            >
          </li>
        </ul>
      </div>
    </nav>

    <div id="app"></div>

    <footer class="site-footer" id="site-footer" hidden>
      <div class="page-wrapper">
        <span class="site-footer__brand">MYBE / BRM1</span>
        <p>Documento válido a partir de sua publicação.</p>
      </div>
    </footer>

    <script>
      var routes = {
        "termos-de-uso": {
          file: "termos-de-uso.html",
          title: "Termos e Condições de Uso",
        },
        "politica-de-privacidade": {
          file: "politica-de-privacidade.html",
          title: "Política de Privacidade",
        },
        "politica-de-cookies": {
          file: "politica-de-cookies.html",
          title: "Política de Cookies",
        },
        "aviso-programa-de-privacidade": {
          file: "aviso-programa-de-privacidade.html",
          title: "Aviso do Programa de Privacidade",
        },
      };

      var app = document.getElementById("app");
      var pageTitle = document.getElementById("page-title");
      var siteFtr = document.getElementById("site-footer");

      function setActiveNav(hash) {
        document.querySelectorAll(".doc-nav__link").forEach(function (a) {
          a.classList.toggle(
            "doc-nav__link--active",
            a.getAttribute("href") === "#" + hash,
          );
        });
      }

      function showHome() {
        document.title = "Documentos Legais — MYBE / BRM1";
        pageTitle.textContent = "Documentos Legais";
        app.innerHTML =
          '<div class="site-main">' +
          '<div class="page-wrapper content-body">' +
          '<h2 class="intro-section__heading" style="margin-bottom:1.5rem">Selecione um documento</h2>' +
          '<ul class="doc-home__list">' +
          '<li><a href="#termos-de-uso">Termos e Condições de Uso</a></li>' +
          '<li><a href="#politica-de-privacidade">Política de Privacidade</a></li>' +
          '<li><a href="#politica-de-cookies">Política de Cookies</a></li>' +
          '<li><a href="#aviso-programa-de-privacidade">Aviso do Programa de Privacidade</a></li>' +
          "</ul>" +
          "</div>" +
          "</div>";
        siteFtr.hidden = true;
        setActiveNav("");
      }

      async function loadRoute(hash) {
        var route = routes[hash];
        if (!route) {
          showHome();
          return;
        }

        app.innerHTML =
          '<div class="site-main" style="padding:3rem 0;text-align:center;color:#718096">Carregando…</div>';

        try {
          var res = await fetch(route.file);
          var text = await res.text();
          var doc = new DOMParser().parseFromString(text, "text/html");
          var main = doc.querySelector("main");
          if (!main) throw new Error("no main");

          var titleEl = doc.querySelector("title");
          document.title = titleEl ? titleEl.textContent : route.title;
          pageTitle.textContent = route.title;

          app.innerHTML = "";
          app.appendChild(document.importNode(main, true));

          var fetchedFtr = doc.querySelector(".site-footer");
          if (fetchedFtr) siteFtr.innerHTML = fetchedFtr.innerHTML;
          siteFtr.hidden = false;
        } catch (e) {
          app.innerHTML =
            '<div class="site-main"><div class="page-wrapper content-body">' +
            '<p style="color:#c53030">Erro ao carregar o documento.</p>' +
            "</div></div>";
          siteFtr.hidden = true;
        }

        setActiveNav(hash);
        window.scrollTo(0, 0);
      }

      function route() {
        var hash = location.hash.replace("#", "");
        if (!hash) showHome();
        else loadRoute(hash);
      }

      window.addEventListener("hashchange", route);
      route();
    </script>
  </body>
</html>
